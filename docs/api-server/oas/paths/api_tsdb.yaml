metrics.names:
  get:
    summary: "Get all metric names"
    description: |-
      Retrieves a paginated list of all available metric names.
    operationId: get_metrics_names
    security:
      - {}
    tags:
      - metrics
    parameters:
      - name: offset
        in: query
        description: Offset for pagination
        schema:
          type: integer
          default: 0
      - name: limit
        in: query
        description: Limit for pagination
        schema:
          type: integer
          default: 100
    responses:
      "200":
        description: A list of metric names
        content:
          application/json:
            schema:
              $ref: "../schemas/api_tsdb.yaml#/metrics.MetricsList"
      "400":
        description: Bad Request
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/error.BadRequest"
            example:
              message: "Bad request: malformed input data"
      "500":
        description: Internal Server Error
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/error.InternalServerError"
            example:
              message: "Internal server error"

metrics.labels.keys:
  get:
    summary: "Get all label keys for a metric"
    description: |-
      Retrieves all label keys associated with a given metric.
    operationId: get_label_keys
    security:
      - {}
    tags:
      - metrics
    parameters:
      - name: metric_name
        in: path
        description: The name of the metric
        required: true
        schema:
          type: string
    responses:
      "200":
        description: A list of label keys
        content:
          application/json:
            schema:
              $ref: "../schemas/api_tsdb.yaml#/metrics.LabelKeysList"
      "400":
        description: Bad Request
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/error.BadRequest"
            example:
              message: "Bad request: malformed input data"
      "404":
        description: Not Found
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/error.NotFoundError"
            example:
              message: "Metric not found"
      "500":
        description: Internal Server Error
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/error.InternalServerError"
            example:
              message: "Internal server error"

metrics.labels.values:
  get:
    summary: "Get all label values for a metric and label key"
    description: |-
      Retrieves all unique values for a specific label key associated with a given metric.
    operationId: get_label_values
    security:
      - {}
    tags:
      - metrics
    parameters:
      - name: metric_name
        in: path
        required: true
        schema:
          type: string
      - name: label_key
        in: path
        required: true
        schema:
          type: string
      - name: offset
        in: query
        description: Offset for pagination
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
      - name: limit
        in: query
        description: Limit for pagination
        required: false
        schema:
          type: integer
          minimum: 1
          default: 100
    responses:
      "200":
        description: A list of label values
        content:
          application/json:
            schema:
              $ref: "../schemas/api_tsdb.yaml#/metrics.LabelValuesList"
      "400":
        description: Bad Request
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/error.BadRequest"
            example:
              message: "Bad request: malformed input data"
      "404":
        description: Not Found
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/error.NotFoundError"
            example:
              message: "Metric or label key not found"
      "500":
        description: Internal Server Error
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/error.InternalServerError"
            example:
              message: "Internal server error"

metrics.values:
  get:
    summary: "Get time-series data"
    description: "Retrieves time-series data for a specific metric and label set within a time range."
    operationId: get_timeseries_data
    security:
      - {}
    tags:
      - metrics
    parameters:
      - name: metric_name
        in: path
        required: true
        schema:
          type: string
      - name: start
        in: query
        description: Start timestamp (ISO8601)
        required: true
        schema:
          type: string
      - name: end
        in: query
        description: End timestamp (ISO8601)
        required: true
        schema:
          type: string
      - name: selector
        in: query
        description: |
          Label selector. Each property name under `selector` is treated
          as a label key (AND condition).
          Example:
            ?selector[instance]=hostA:9100&selector[job]=node
        required: false
        style: deepObject
        explode: true
        schema:
          $ref: '../schemas/api_tsdb.yaml#/meta.SelectorQuery'
        examples:
          simple:
            summary: Filter by single label
            value:
              instance: hostA:9100
          multiple:
            summary: Multiple AND match conditions
            value:
              instance: hostA:9100
              job: node
    responses:
      "200":
        description: "Time-series data response"
        content:
          application/json:
            schema:
              $ref: "../schemas/api_tsdb.yaml#/metrics.TimeSeriesData"
      "400":
        description: Bad Request
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/error.BadRequest"
            example:
              message: "Bad request: malformed input data"
      "404":
        description: Not Found
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/error.NotFoundError"
            example:
              message: "Metric or label-value set not found"
      "500":
        description: Internal Server Error
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/error.InternalServerError"
            example:
              message: "Internal server error"
  delete:
    summary: "Delete time-series data"
    description: "Schedules a background operation to delete time-series data for a specific metric and label set."
    operationId: delete_timeseries_data
    security:
      - {}
    tags:
      - metrics
    parameters:
      - name: metric_name
        in: path
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/api_tsdb.yaml#/meta.Selector"
    responses:
      "202":
        description: "Operation accepted for processing."
        content:
          application/json:
            schema:
              $ref: "../schemas/success.yaml#/success.AcceptedResponse"
      "400":
        description: Bad Request
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/error.BadRequest"
            example:
              message: "Bad request: malformed input data"
      "423":
        description: Locked
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/error.LockedError"
            example:
              message: "Locked: another modification operation is in progress"
      "500":
        description: Internal Server Error
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/error.InternalServerError"
            example:
              message: "Internal server error"

meta.status:
  get:
    summary: "Get modification status"
    description: "Retrieves the current status of metadata modification operation."
    operationId: get_modification_status
    security:
      - {}
    tags:
      - metadata
    parameters:
      - name: operation_id
        in: query
        description: The unique identifier for the asynchronous background operation
        required: true
        schema:
          type: string
          example: "20251126T123456_1"
    responses:
      "200":
        description: "Operation accepted for processing."
        content:
          application/json:
            schema:
              $ref: "../schemas/api_tsdb.yaml#/meta.OperationStatusResponse"
      "400":
        description: Bad Request
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/error.BadRequest"
            example:
              message: "Bad request: malformed input data"
      "500":
        description: Internal Server Error
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/error.InternalServerError"
            example:
              message: "Internal server error"

