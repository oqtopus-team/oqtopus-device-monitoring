global:
  scrape_interval: 60s
  external_labels:
    env: local

scrape_configs:
  - job_name: "node_machine1"
    static_configs:
      - targets: ["host.docker.internal:9100"]
  - job_name: "cadvisor_machine1"
    static_configs:
      - targets: ["host.docker.internal:8088"]
  - job_name: "node_machine2"
    static_configs:
      - targets: ["machine2:9100"]
  - job_name: "cadvisor_machine2"
    static_configs:
      - targets: ["machine2:8088"]
  - job_name: "cryo-metrics"
    honor_timestamps: true
    static_configs:
      - targets: ["host.docker.internal:9101"]
  - job_name: "quel1-ping"
    static_configs:
      - targets: ["machine2:9102"]
  # commented out since quel1-se-metrics is not used
  # - job_name: "quel1-se-metrics"
  #   scrape_interval: 10s
  #   static_configs:
  #     - targets: ["machine2:9103"]
