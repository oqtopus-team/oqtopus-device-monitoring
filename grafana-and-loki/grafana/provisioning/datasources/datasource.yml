apiVersion: 1
datasources:
  - name: VictoriaMetricsCluster
    uid: vmcluster
    type: prometheus
    access: proxy
    url: http://host.docker.internal:8428/select/0/prometheus # Replace this HOST_IP placeholder with the host machine's IP address
    isDefault: true
    jsonData:
      httpMethod: POST
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    jsonData:
      maxLines: 5000
